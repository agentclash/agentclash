    # --- Hosted Runs ---

    HostedRunEvent:
      type: object
      required: [run_agent_id, external_run_id, event_type, occurred_at]
      properties:
        run_agent_id:
          type: string
          format: uuid
        external_run_id:
          type: string
        event_type:
          type: string
          enum: [run_started, final_answer, error, run_finished]
        occurred_at:
          type: string
          format: date-time
        final_status:
          type: string
          enum: [completed, failed]
        output:
          type: object
          additionalProperties: true
        error_message:
          type: string
        latency_ms:
          type: integer
          format: int64
        metadata:
          type: object
          additionalProperties: true
          description: >
            Optional hosted trace metadata. When `metadata.trace_events` (or
            `metadata.events`) is present, AgentClash ingests each entry as an
            additional canonical replay event so hosted runs can surface
            structured internal subagent/model/tool steps in replay and UI.

