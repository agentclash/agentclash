      properties:
        id:
          type: string
          format: uuid
        agent_build_id:
          type: string
          format: uuid
        version_number:
          type: integer
          format: int32
        version_status:
          type: string
          enum: [draft, ready, deprecated]
        agent_kind:
          type: string
        interface_spec:
          type: object
          additionalProperties: true
        policy_spec:
          type: object
          additionalProperties: true
        reasoning_spec:
          type: object
          additionalProperties: true
        memory_spec:
          type: object
          additionalProperties: true
        workflow_spec:
          type: object
          additionalProperties: true
        guardrail_spec:
          type: object
          additionalProperties: true
        model_spec:
          type: object
          additionalProperties: true
        output_schema:
          type: object
          additionalProperties: true
        trace_contract:
          type: object
          additionalProperties: true
        publication_spec:
          type: object
          additionalProperties: true
        tools:
          type: array
          items:
            $ref: "#/components/schemas/ToolBindingResponse"
        knowledge_sources:
          type: array
          items:
            $ref: "#/components/schemas/KnowledgeSourceBindingResponse"
        created_at:
          type: string
          format: date-time

