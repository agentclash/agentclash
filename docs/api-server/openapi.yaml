      required: [source_challenge_pack_id, name]
      properties:
        source_challenge_pack_id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        default_gate_severity:
          $ref: "#/components/schemas/RegressionSeverity"

    PatchRegressionSuiteInput:
      type: object
      minProperties: 1
      properties:
        name:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/RegressionSuiteStatus"
        default_gate_severity:
          $ref: "#/components/schemas/RegressionSeverity"

    PatchRegressionCaseInput:
      type: object
      minProperties: 1
      properties:
        title:
          type: string
        description:
          type: string
        status:
          $ref: "#/components/schemas/RegressionCaseStatus"
        severity:
          $ref: "#/components/schemas/RegressionSeverity"

    PromoteFailureInput:
      type: object
      required: [suite_id, promotion_mode, title]
      properties:
        run_agent_id:
          type: string
          format: uuid
          description: >
            Optional disambiguator for compare or multi-agent runs where the same
            challenge identity appears in multiple failure review items.
        suite_id:
          type: string
          format: uuid
        promotion_mode:
          type: string
          enum: [full_executable, output_only]
        title:
          type: string
        failure_summary:
          type: string
        severity:
          $ref: "#/components/schemas/RegressionSeverity"
        validator_overrides:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"
        metadata:
          anyOf:
            - type: object
              additionalProperties: true
            - type: "null"

    ListRegressionSuitesResponse:
      type: object
      required: [items, total, limit, offset]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RegressionSuite"
        total:
          type: integer
          format: int64
        limit:
          type: integer
          format: int32
        offset:
          type: integer
          format: int32

    ListRegressionCasesResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/RegressionCase"

    # --- Ranking ---

    RunRankingResponse:
      type: object
      required: [state]
      properties:
        state:
          $ref: "#/components/schemas/RankingReadState"
        message:
          type: string
        ranking:
          $ref: "#/components/schemas/RunRankingPayload"

    CreateRunRankingInsightsRequest:
      type: object
      required: [provider_account_id, model_alias_id]
      properties:
        provider_account_id:
          type: string
          format: uuid
        model_alias_id:
          type: string
          format: uuid

    RunRankingInsightsResponse:
      type: object
      required:
        [
          generated_at,
          grounding_scope,
          provider_key,
          provider_model_id,
          recommended_winner,
          why_it_won,
          tradeoffs,
          model_summaries,
          recommended_next_step,
          confidence_notes,
        ]
      properties:
        generated_at:
          type: string
          format: date-time
        grounding_scope:
          type: string
        provider_key:
          type: string
        provider_model_id:
          type: string
        recommended_winner:
          $ref: "#/components/schemas/RunRankingInsightCandidate"
        why_it_won:
          type: string
        tradeoffs:
          type: array
          items:
            type: string
        best_for_reliability:
          $ref: "#/components/schemas/RunRankingInsightRecommendation"
        best_for_cost:
          $ref: "#/components/schemas/RunRankingInsightRecommendation"
        best_for_latency:
          $ref: "#/components/schemas/RunRankingInsightRecommendation"
        model_summaries:
          type: array
          items:
            $ref: "#/components/schemas/RunRankingModelInsight"
        recommended_next_step:
          type: string
        confidence_notes:
          type: string

    RunRankingInsightCandidate:
      type: object
      required: [run_agent_id, label]
      properties:
        run_agent_id:
          type: string
          format: uuid
        label:
          type: string

    RunRankingInsightRecommendation:
      type: object
      required: [run_agent_id, label, reason]
      properties:
        run_agent_id:
          type: string
          format: uuid
        label:
          type: string
        reason:
          type: string

    RunRankingModelInsight:
      type: object
      required:
        [run_agent_id, label, strongest_dimension, weakest_dimension, summary]
      properties:
        run_agent_id:
          type: string
          format: uuid
        label:
          type: string
        strongest_dimension:
          type: string
        weakest_dimension:
          type: string
        summary:
          type: string

    RunRankingPayload:
      type: object
      required: [run_id, evaluation_spec_id, sort, winner, evidence_quality, items]
      properties:
        run_id:
          type: string
          format: uuid
        evaluation_spec_id:
          type: string
          format: uuid
        sort:
          $ref: "#/components/schemas/RunRankingSort"
        winner:
          $ref: "#/components/schemas/RunRankingWinner"
        evidence_quality:
          $ref: "#/components/schemas/EvidenceQuality"
        items:
          type: array
          items:
            $ref: "#/components/schemas/RunRankingItem"

    RunRankingSort:
      type: object
      required: [field, direction, default_order]
      properties:
        field:
          type: string
        direction:
          type: string
        default_order:
          type: boolean

    RunRankingWinner:
      type: object
      required: [strategy, status, reason_code]
      properties:
        run_agent_id:
          type: string
          format: uuid
        strategy:
          type: string
        status:
          type: string
        reason_code:
          type: string

    RunRankingItem:
      type: object
      required: [run_agent_id, lane_index, label, status, has_scorecard, sort_state]
      properties:
        rank:
          type: integer
        run_agent_id:
          type: string
          format: uuid
        lane_index:
          type: integer
          format: int32
        label:
          type: string
        status:
          $ref: "#/components/schemas/RunAgentStatus"
        has_scorecard:
          type: boolean
        evaluation_status:
          type: string
        sort_value:
          type: number
          format: double
        delta_from_top:
          type: number
          format: double
        sort_state:
          type: string
        composite_score:
          type: number
          format: double
        overall_score:
          type: number
          format: double
        correctness_score:
          type: number
          format: double
        reliability_score:
          type: number
          format: double
        latency_score:
          type: number
          format: double
        cost_score:
          type: number
          format: double
        dimensions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DimensionScore"

    DimensionScore:
      type: object
      required: [state]
      properties:
        state:
          type: string
        score:
          type: number
          format: double

    EvidenceQuality:
      type: object
      properties:
        missing_fields:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string

    # --- Replays ---

    ReplayResponse:
      type: object
      required: [state, run_agent_id, run_id, run_agent_status, steps, pagination]
      properties:
        state:
          $ref: "#/components/schemas/ReplayState"
        message:
          type: string
        run_agent_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        run_agent_status:
          $ref: "#/components/schemas/RunAgentStatus"
        replay:
          $ref: "#/components/schemas/ReplayPayload"
        steps:
          type: array
          items:
            type: object
            additionalProperties: true
        pagination:
          $ref: "#/components/schemas/ReplayPagination"

    ReplayPayload:
      type: object
      required: [id, summary, event_count, created_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        artifact_id:
          type: string
          format: uuid
        summary:
          type: object
          additionalProperties: true
        latest_sequence_number:
          type: integer
          format: int64
        event_count:
          type: integer
          format: int64
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReplayPagination:
      type: object
      required: [limit, total_steps, has_more]
      properties:
        next_cursor:
          type: string
        limit:
          type: integer
        total_steps:
          type: integer
        has_more:
          type: boolean

    # --- Scorecards ---

    ScorecardResponse:
      type: object
      required: [state, run_agent_status, id, run_agent_id, run_id, evaluation_spec_id, llm_judge_results, scorecard, created_at, updated_at]
      properties:
        state:
          $ref: "#/components/schemas/ReplayState"
        message:
          type: string
        run_agent_status:
          $ref: "#/components/schemas/RunAgentStatus"
        id:
          type: string
          format: uuid
        run_agent_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        evaluation_spec_id:
          type: string
          format: uuid
        overall_score:
          type: number
          format: double
        correctness_score:
          type: number
          format: double
        reliability_score:
          type: number
          format: double
        latency_score:
          type: number
          format: double
        cost_score:
          type: number
          format: double
        behavioral_score:
          type: number
          format: double
        llm_judge_results:
          type: array
          items:
            type: object
            required: [id, judge_key, mode, sample_count, model_count, payload, created_at, updated_at]
            properties:
              id:
                type: string
                format: uuid
              judge_key:
                type: string
              mode:
                type: string
              normalized_score:
                type: number
                format: double
              confidence:
                type: string
              variance:
                type: number
                format: double
              sample_count:
                type: integer
                format: int32
              model_count:
                type: integer
                format: int32
              payload:
                type: object
                additionalProperties: true
              created_at:
                type: string
                format: date-time
              updated_at:
                type: string
                format: date-time
        scorecard:
          $ref: "#/components/schemas/ScorecardDocument"
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ScorecardDocument:
      type: object
      properties:
        run_agent_id:
          type: string
          format: uuid
        evaluation_spec_id:
          type: string
          format: uuid
        status:
          type: string
        strategy:
          type: string
        overall_score:
          type: number
          format: double
        passed:
          type: boolean
        overall_reason:
          type: string
        warnings:
          type: array
          items:
            type: string
        dimensions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ScorecardDimension"
        validator_summary:
          type: object
          additionalProperties:
            type: integer
        validator_details:
          type: array
          items:
            $ref: "#/components/schemas/ValidatorDetail"
        metric_summary:
          type: object
          additionalProperties:
            type: integer
        metric_details:
          type: array
          items:
            $ref: "#/components/schemas/MetricDetail"
      additionalProperties: true

    ValidatorDetail:
      type: object
      required: [key, type, verdict, state]
      properties:
        key:
          type: string
        type:
          type: string
        verdict:
          type: string
        state:
          type: string
        reason:
          type: string
        normalized_score:
          type: number
          format: double
        regression_case_id:
          type: string
          format: uuid
        evidence:
          $ref: "#/components/schemas/ValidatorEvidence"
        source:
          $ref: "#/components/schemas/ScorecardSource"

    MetricDetail:
      type: object
      required: [key, collector, state]
      properties:
        key:
          type: string
        collector:
          type: string
        state:
          type: string
        reason:
          type: string
        regression_case_id:
          type: string
          format: uuid
        numeric_value:
          type: number
          format: double
        text_value:
          type: string
        boolean_value:
          type: boolean

    ScorecardSource:
      type: object
      description: |
        Optional pointer from a validator or metric result to the run event
        that produced the evaluated value. Omitted when the evidence is
        aggregated across multiple events or sourced from challenge inputs
        that do not live in the trace. Use `sequence` to deep-link into the
        replay timeline — run events are uniquely addressed by
        (run_agent_id, sequence_number).
      required: [kind]
      properties:
        kind:
          type: string
          enum: [run_event, tool_call, model_call, final_output]
          description: |
            Coarse categorization for how the inspector should label the link.
            `run_event` is a generic pointer, `tool_call` identifies a
            grader/tool verification event, `model_call` identifies a
            model.call.completed event (used as the final-output producer on
            native runs that don't emit a dedicated finalized event), and
            `final_output` identifies the synthesized system.output.finalized
            event.
        sequence:
          type: integer
          format: int64
          description: |
            Monotonic per-run-agent sequence number of the originating event.
            Matches `run_events.sequence_number`.
        event_type:
          type: string
          description: Denormalized run event type (e.g. `system.run.completed`).
        field_path:
          type: string
          description: |
            Validator target / JSON path within the event payload the evidence
            was drawn from (e.g. `final_output`, `file:generated_code`).

    ValidatorEvidence:
      discriminator:
        propertyName: kind
      oneOf:
        - $ref: "#/components/schemas/ValidatorTextCompareEvidence"
        - $ref: "#/components/schemas/ValidatorRegexEvidence"
        - $ref: "#/components/schemas/ValidatorJSONSchemaEvidence"
        - $ref: "#/components/schemas/ValidatorJSONPathEvidence"
        - $ref: "#/components/schemas/ValidatorCustomEvidence"

    ValidatorTextCompareEvidence:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [text_compare]
        expected:
          type: string
        actual:
          type: string
        source_field:
          type: string

    ValidatorRegexEvidence:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [regex_match]
        pattern:
          type: string
        actual:
          type: string
        matched:
          type: boolean
        source_field:
          type: string

    ValidatorJSONSchemaEvidence:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [json_schema]
        schema_ref:
          type: string
        actual:
          type: string
        validation_errors:
          type: array
          items:
            type: string
        source_field:
          type: string

    ValidatorJSONPathEvidence:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [json_path_match]
        path:
          type: string
        comparator:
          type: string
        actual:
          description: Arbitrary JSON value extracted from the JSONPath comparator target.
        expected:
          description: Arbitrary JSON value declared in the JSONPath expectation.
        exists:
          type: boolean
        source_field:
          type: string

    ValidatorCustomEvidence:
      type: object
      required: [kind]
      properties:
        kind:
          type: string
          enum: [custom]
        raw:
          description: Raw validator evidence payload when no structured mapping is available.

    ScorecardDimension:
      type: object
      properties:
        state:
          type: string
          description: Availability state for this dimension in the stored scorecard.
        score:
          type: number
          format: double
          description: Raw normalized dimension score when the dimension is available.
        reason:
          type: string
        better_direction:
          type: string
        weight:
          type: number
          format: double
          description: Effective dimension weight from the evaluation spec. Defaults to 1.0 when omitted in the spec so clients can render the active scoring behavior explicitly.
        contribution:
          type: number
          format: double
          description: Normalized relative contribution signal derived from the scoring strategy's weighting semantics. For weighted and hybrid strategies it reflects the dimension's share of the weighted score calculation; for binary or failed-gate cases it may not sum to the final overall score and should be treated as relative impact, not a strict score decomposition.
        pass_threshold:
          type: number
          format: double
          description: Dimension pass threshold from the evaluation spec when configured.
        gate:
          type: boolean
          description: Whether this dimension acts as a required gate for the active strategy.
        gate_passed:
          type: boolean
          description: Whether the dimension cleared its required gate threshold. Omitted when the dimension is not a required gate.
      additionalProperties: true

    # --- Compare ---

    ComparisonResponse:
      type: object
      required: [state, status, baseline_run_id, candidate_run_id, generated_at, key_deltas, regression_reasons, evidence_quality, summary, links]
      properties:
        state:
          $ref: "#/components/schemas/ComparisonReadState"
        status:
          type: string
        reason_code:
          type: string
        baseline_run_id:
          type: string
          format: uuid
        candidate_run_id:
          type: string
          format: uuid
        baseline_run_agent_id:
          type: string
          format: uuid
        candidate_run_agent_id:
          type: string
          format: uuid
        generated_at:
          type: string
          format: date-time
        key_deltas:
          type: array
          items:
            $ref: "#/components/schemas/DeltaHighlight"
        regression_reasons:
          type: array
          items:
            type: string
        evidence_quality:
          $ref: "#/components/schemas/EvidenceQuality"
        summary:
          type: object
          additionalProperties: true
          description: Full comparison summary document
        links:
          type: object
          required: [viewer]
          properties:
            viewer:
              type: string

    DeltaHighlight:
      type: object
      required: [metric, better_direction, outcome, state]
      properties:
        metric:
          type: string
        baseline_value:
          type: number
          format: double
        candidate_value:
          type: number
          format: double
        delta:
          type: number
          format: double
        better_direction:
          type: string
        outcome:
          type: string
        state:
          type: string

    # --- Release Gates ---

    ReleaseGatePolicy:
      type: object
      required: [policy_key, policy_version]
      properties:
        policy_key:
          type: string
        policy_version:
          type: integer
        require_comparable:
          type: boolean
        require_evidence_quality:
          type: boolean
        fail_on_candidate_failure:
          type: boolean
        fail_on_both_failed_differently:
          type: boolean
        required_dimensions:
          type: array
          items:
            type: string
        dimensions:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/DimensionThreshold"
        regression_gate_rules:
          $ref: "#/components/schemas/RegressionGateRules"

    DimensionThreshold:
      type: object
      properties:
        warn_delta:
          type: number
          format: double
        fail_delta:
          type: number
          format: double

    RegressionGateRules:
      type: object
      properties:
        no_blocking_regression_failure:
          type: boolean
        no_new_blocking_failure_vs_baseline:
          type: boolean
        max_warning_regression_failures:
          type: integer
          minimum: 0
        suite_ids:
          type: array
          items:
            type: string
            format: uuid

    EvaluateReleaseGateRequest:
      type: object
      required: [baseline_run_id, candidate_run_id, policy]
      properties:
        baseline_run_id:
          type: string
          format: uuid
        candidate_run_id:
          type: string
          format: uuid
        baseline_run_agent_id:
          type: string
          format: uuid
        candidate_run_agent_id:
          type: string
          format: uuid
        policy:
          $ref: "#/components/schemas/ReleaseGatePolicy"

    EvaluateReleaseGateResponse:
      type: object
      required: [baseline_run_id, candidate_run_id, release_gate]
      properties:
        baseline_run_id:
          type: string
          format: uuid
        candidate_run_id:
          type: string
          format: uuid
        release_gate:
          $ref: "#/components/schemas/ReleaseGate"

    ListReleaseGatesResponse:
      type: object
      required: [baseline_run_id, candidate_run_id, release_gates]
      properties:
        baseline_run_id:
          type: string
          format: uuid
        candidate_run_id:
          type: string
          format: uuid
        release_gates:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseGate"

    ReleaseGate:
      type: object
      required: [id, run_comparison_id, policy_key, policy_version, policy_fingerprint, policy_snapshot, verdict, reason_code, summary, evidence_status, evaluation_details, generated_at, updated_at]
      properties:
        id:
          type: string
          format: uuid
        run_comparison_id:
          type: string
          format: uuid
        policy_key:
          type: string
        policy_version:
          type: integer
        policy_fingerprint:
          type: string
        policy_snapshot:
          type: object
          additionalProperties: true
        verdict:
          type: string
          enum: [pass, warn, fail, insufficient_evidence]
        reason_code:
          type: string
        summary:
          type: string
        evidence_status:
          type: string
        evaluation_details:
          $ref: "#/components/schemas/ReleaseGateEvaluationDetails"
        generated_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    ReleaseGateEvaluationDetails:
      type: object
      required: [policy_key, policy_version, comparison_status]
      properties:
        policy_key:
          type: string
        policy_version:
          type: integer
        comparison_status:
          type: string
        missing_fields:
          type: array
          items:
            type: string
        warnings:
          type: array
          items:
            type: string
        triggered_conditions:
          type: array
          items:
            type: string
        required_dimensions:
          type: array
          items:
            type: string
        dimension_results:
          type: object
          additionalProperties:
            $ref: "#/components/schemas/ReleaseGateDimensionEvaluation"
        regression_violations:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseGateRegressionViolation"

    ReleaseGateDimensionEvaluation:
      type: object
      required: [state, outcome]
      properties:
        state:
          type: string
        better_direction:
          type: string
        observed_delta:
          type: number
          format: double
        worsening_delta:
          type: number
          format: double
        warn_threshold:
          type: number
          format: double
        fail_threshold:
          type: number
          format: double
        outcome:
          type: string

    ReleaseGateRegressionViolation:
      type: object
      required: [rule, severity, regression_case_id, suite_id, evidence]
      properties:
        rule:
          type: string
        severity:
          type: string
        regression_case_id:
          type: string
          format: uuid
        suite_id:
          type: string
          format: uuid
        observed_count:
          type: integer
        evidence:
          $ref: "#/components/schemas/ReleaseGateRegressionEvidence"

    ReleaseGateRegressionEvidence:
      type: object
      required: [scoring_result_id, scoring_result_type]
      properties:
        scoring_result_id:
          type: string
          format: uuid
        scoring_result_type:
          type: string
        replay_step_refs:
          type: array
          items:
            $ref: "#/components/schemas/ReleaseGateReplayStepRef"

    ReleaseGateReplayStepRef:
      type: object
      required: [sequence_number]
      properties:
        sequence_number:
          type: integer
          format: int64
        event_type:
          type: string
        kind:
          type: string

    # --- Artifacts ---

    ListArtifactsResponse:
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $ref: "#/components/schemas/ArtifactUploadResponse"

    ArtifactUploadResponse:
      type: object
      required: [id, workspace_id, artifact_type, visibility, metadata, created_at]
      properties:
        id:
          type: string
          format: uuid
        workspace_id:
          type: string
          format: uuid
        run_id:
          type: string
          format: uuid
        run_agent_id:
          type: string
          format: uuid
        artifact_type:
          type: string
        content_type:
          type: string
        size_bytes:
          type: integer
          format: int64
        checksum_sha256:
          type: string
        visibility:
          type: string
        metadata:
          type: object
