    post:
      operationId: promoteFailureReviewItem
      tags: [Runs, Regression Suites]
      summary: Promote a failure review item into a regression case
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
        - $ref: "#/components/parameters/RunID"
        - name: challengeIdentityID
          in: path
