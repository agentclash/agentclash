# =============================================================================
# Components
# =============================================================================
components:
  # ---------------------------------------------------------------------------
  # Security Schemes
  # ---------------------------------------------------------------------------
  securitySchemes:
    bearerJWT:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: >
        Bearer token for authenticated API requests. Web sessions use a WorkOS JWT
        and CLI sessions use an AgentClash token prefixed with `clitok_`.
        In development mode, use custom headers instead:
        X-Agentclash-User-Id, X-Agentclash-WorkOS-User-Id,
        X-Agentclash-User-Email, X-Agentclash-User-Display-Name,
        X-Agentclash-Workspace-Memberships.
    hostedRunToken:
      type: http
      scheme: bearer
      description: >
        HMAC-SHA256 callback token issued when a hosted run is started.
        Not a JWT — the token encodes run_id and run_agent_id claims.
    artifactSignature:
      type: apiKey
      in: query
      name: signature
      description: >
        HMAC-SHA256 signature for artifact content URLs. Must be paired with
        an "expires" query parameter (unix timestamp).

  # ---------------------------------------------------------------------------
  # Parameters
  # ---------------------------------------------------------------------------
  parameters:
    WorkspaceID:
      name: workspaceID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunID:
      name: runID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RunAgentID:
      name: runAgentID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ArtifactID:
      name: artifactID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AgentBuildID:
      name: agentBuildID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    VersionID:
      name: versionID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ResourceID:
      name: id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RegressionSuiteID:
      name: suiteID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    RegressionCaseID:
      name: caseID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    OrganizationID:
      name: organizationID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    MembershipID:
      name: membershipID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ProfileID:
      name: profileID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AccountID:
      name: accountID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    EntryID:
      name: entryID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    AliasID:
      name: aliasID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    ToolID:
      name: toolID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SourceID:
      name: sourceID
      in: path
      required: true
      schema:
        type: string
        format: uuid
    SecretKey:
      name: secretKey
      in: path
      required: true
      schema:
        type: string
        pattern: "^[A-Za-z_][A-Za-z0-9_]*$"
        minLength: 1
        maxLength: 128

  # ---------------------------------------------------------------------------
  # Responses
  # ---------------------------------------------------------------------------
  responses:
    ValidationError:
      description: Invalid request
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnauthorizedError:
      description: Authentication required
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ForbiddenError:
      description: Insufficient permissions
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    NotFoundError:
      description: Resource not found
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    UnsupportedMediaType:
      description: Content-Type must be application/json
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    ConflictError:
      description: Resource conflict
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    GoneError:
      description: Resource expired or removed
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"
    InternalError:
      description: Internal server error
      content:
        application/json:
          schema:
            $ref: "#/components/schemas/ErrorEnvelope"

  # ---------------------------------------------------------------------------
  # Schemas
  # ---------------------------------------------------------------------------
  schemas:
    # --- Shared ---

    ErrorEnvelope:
      type: object
      required: [error]
      properties:
        error:
          type: object
          required: [code, message]
          properties:
            code:
              type: string
            message:
              type: string

    EmptyObject:
      type: object
      additionalProperties: false

    ValidationResult:
      type: object
      required: [valid, errors]
      properties:
        valid:
          type: boolean
        errors:
          type: array
          items:
            $ref: "#/components/schemas/ValidationErrorDetail"

    ValidationErrorDetail:
      type: object
      required: [field, message]
      properties:
        field:
          type: string
        message:
          type: string

    RunStatus:
      type: string
      enum:
        - draft
        - queued
        - provisioning
        - running
        - scoring
        - completed
        - failed
        - cancelled

    EvalSessionStatus:
      type: string
      enum:
        - queued
        - running
        - aggregating
        - completed
        - failed
        - cancelled

    RunAgentStatus:
      type: string
      enum:
        - queued
        - ready
        - executing
        - evaluating
        - completed
        - failed

    ReplayState:
      type: string
      enum: [ready, pending, errored]

    RankingReadState:
      type: string
      enum: [ready, pending, errored]

    ComparisonReadState:
      type: string
      enum: [comparable, partial_evidence, not_comparable]

    # --- Health ---

    HealthResponse:
      type: object
      required: [ok, service]
      properties:
        ok:
          type: boolean
        service:
          type: string
          example: api-server

    # --- Session ---

    SessionResponse:
      type: object
      required: [user_id, organization_memberships, workspace_memberships]
      properties:
        user_id:
          type: string
          format: uuid
        workos_user_id:
          type: string
        email:
          type: string
        display_name:
          type: string
        organization_memberships:
          type: array
          items:
            $ref: "#/components/schemas/SessionOrganizationMembership"
        workspace_memberships:
          type: array
          items:
            $ref: "#/components/schemas/SessionWorkspaceMembership"

    SessionOrganizationMembership:
      type: object
      required: [organization_id, role]
      properties:
        organization_id:
          type: string
          format: uuid
        role:
          type: string

    SessionWorkspaceMembership:
      type: object
