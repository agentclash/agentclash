  /v1/eval-sessions:
    get:
      operationId: listEvalSessions
      tags: [EvalSessions]
      summary: List eval sessions for a workspace
      description: >
        Lists recent eval sessions for the requested workspace, including child-run
        summary counts and aggregation-readiness warnings.
      security:
        - bearerJWT: []
      parameters:
        - in: query
          name: workspace_id
          required: true
          schema:
            type: string
            format: uuid
        - in: query
          name: limit
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - in: query
          name: offset
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
      responses:
        "200":
          description: Eval sessions for the workspace
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListEvalSessionsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: createEvalSession
      tags: [EvalSessions]
      summary: Create a new eval session
      description: >
        Creates an eval session and queues one child run per requested repetition.
        Participants are resolved from agent build versions to active deployments
        in the selected workspace before any runs are created.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateEvalSessionRequest"
      responses:
        "201":
          description: Eval session created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateEvalSessionResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "413":
          description: Request body exceeds 1 MiB
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "422":
          description: Eval session configuration validation failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EvalSessionValidationEnvelope"

  /v1/eval-sessions/{evalSessionID}:
    get:
      operationId: getEvalSession
      tags: [EvalSessions]
      summary: Get eval session details
      description: >
        Returns the eval session, attached child runs, child-run summary counts,
        and aggregation-readiness warnings for inspection workflows.
      security:
        - bearerJWT: []
      parameters:
        - in: path
          name: evalSessionID
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "200":
          description: Eval session details
          content:
            application/json:
