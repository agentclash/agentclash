openapi: "3.1.0"
info:
  title: AgentClash API
  version: 1.0.0
  description: >
    B2B AI agent evaluation platform. Pits agent deployments against challenge
    packs, with replay inspection, scoring, comparison, and release gating.
  license:
    name: MIT
  contact:
    url: https://github.com/Atharva-Kanherkar/agentclash

servers:
  - url: http://localhost:8080
    description: Local development

tags:
  - name: Health
    description: Liveness and readiness probes
  - name: Session
    description: Current user session and identity
  - name: Workspace
    description: Workspace access verification
  - name: Runs
    description: Create, read, and list evaluation runs
  - name: EvalSessions
    description: Create evaluation sessions that fan out into repeated runs
  - name: Replays
    description: Step-by-step execution replays
  - name: Scorecards
    description: Agent scoring and evaluation results
  - name: Compare
    description: Side-by-side run comparison
  - name: ReleaseGates
    description: Release gate policy evaluation
  - name: Regressions
    description: Workspace regression suite and case management
  - name: Artifacts
    description: File upload, download, and content delivery
  - name: ChallengePacks
    description: Challenge pack management and authoring
  - name: AgentBuilds
    description: Agent build and version lifecycle
  - name: AgentDeployments
    description: Agent deployment management
  - name: HostedRuns
    description: External hosted agent event ingestion
  - name: Playgrounds
    description: Prompt playground experimentation and comparison
  - name: UserProfile
    description: Current user profile with org/workspace hierarchy
  - name: Onboarding
    description: First-time organization and workspace setup
  - name: Organizations
    description: Organization CRUD and management
  - name: OrgMemberships
    description: Organization membership invitations and updates
  - name: Workspaces
    description: Workspace details and management
  - name: WorkspaceMemberships
    description: Workspace membership invitations and updates
  - name: WorkspaceSecrets
    description: Encrypted workspace secret management
  - name: RuntimeProfiles
    description: Execution runtime profile configuration
  - name: ProviderAccounts
    description: LLM provider account credentials
  - name: ModelCatalog
    description: Global model registry
  - name: ModelAliases
    description: Workspace-scoped model alias mappings
  - name: Tools
    description: Workspace tool definitions
  - name: KnowledgeSources
    description: Workspace knowledge source connections
  - name: Policies
    description: Routing and spend policy configuration

paths:
  # ---------------------------------------------------------------------------
  # Health
  # ---------------------------------------------------------------------------
  /healthz:
    get:
      operationId: getHealth
      tags: [Health]
      summary: Health check
      description: Returns service health status for load balancers and orchestrators.
      security: []
      responses:
        "200":
          description: Service is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthResponse"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # Public artifact content (HMAC-signed URL)
  # ---------------------------------------------------------------------------
  /artifacts/{artifactID}/content:
    get:
      operationId: getArtifactContent
      tags: [Artifacts]
      summary: Download artifact content
      description: >
        Streams artifact binary content. Requires a valid HMAC-signed URL
        obtained from the authenticated download endpoint. A 30-second grace
        period is allowed past the expiry timestamp.
      security:
        - artifactSignature: []
      parameters:
        - $ref: "#/components/parameters/ArtifactID"
        - name: expires
          in: query
          required: true
          schema:
            type: integer
            format: int64
          description: Unix timestamp when the signed URL expires
        - name: signature
          in: query
          required: true
          schema:
            type: string
          description: HMAC-SHA256 signature
      responses:
        "200":
          description: Artifact binary content
          headers:
            Content-Type:
              schema:
                type: string
            Content-Disposition:
              schema:
                type: string
            Content-Security-Policy:
              schema:
                type: string
                example: "sandbox; default-src 'none'"
          content:
            application/octet-stream:
              schema:
                type: string
                format: binary
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ---------------------------------------------------------------------------
  # Hosted integration
  # ---------------------------------------------------------------------------
  /v1/integrations/hosted-runs/{runID}/events:
    post:
      operationId: ingestHostedRunEvent
      tags: [HostedRuns]
      summary: Ingest hosted run event
      description: >
        Webhook-style endpoint for externally hosted agents to report execution
        events. Authenticated via an HMAC-signed callback token (not JWT).
      security:
        - hostedRunToken: []
      parameters:
        - $ref: "#/components/parameters/RunID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/HostedRunEvent"
      responses:
        "202":
          description: Event accepted
          content:
            application/json:
              schema:
                type: object
                required: [accepted]
                properties:
                  accepted:
                    type: boolean
                    example: true
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  # ---------------------------------------------------------------------------
  # Session
  # ---------------------------------------------------------------------------
  /v1/auth/session:
    get:
      operationId: getSession
      tags: [Session]
      summary: Get current session
      description: Returns the authenticated user's identity and workspace memberships.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Current user session
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"

  # ---------------------------------------------------------------------------
  # CLI Auth
  # ---------------------------------------------------------------------------
  /v1/cli-auth/device:
    post:
      operationId: createCliDeviceCode
      tags: [CLIAuth]
      summary: Start a CLI verification login
      security: []
      description: >
        Creates a short-lived device verification code for `agentclash auth login`.
        The response includes a browser-safe verification URL and the user-facing code.
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EmptyObject"
      responses:
        "201":
          description: Device verification created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateDeviceCodeResponse"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/cli-auth/device/token:
    post:
      operationId: pollCliDeviceToken
      tags: [CLIAuth]
      summary: Poll a pending CLI verification login
      security: []
      description: >
        Polls the device verification flow until the browser approval has issued a CLI token.
        Returns `authorization_pending`, `access_denied`, or `expired_token` errors while polling.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/PollDeviceTokenRequest"
      responses:
        "200":
          description: CLI token issued
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PollDeviceTokenResponse"
        "400":
          description: Polling state or invalid request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/cli-auth/device/approve:
    post:
      operationId: approveCliDeviceCode
      tags: [CLIAuth]
      summary: Approve a pending CLI verification login
      description: >
        Approves a pending CLI login from the authenticated web session and issues
        the corresponding CLI token for the waiting terminal.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ApproveDeviceCodeRequest"
      responses:
        "200":
          description: Device verification approved
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceApprovalResponse"
        "400":
          description: Invalid or expired verification code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /v1/cli-auth/device/deny:
    post:
      operationId: denyCliDeviceCode
      tags: [CLIAuth]
      summary: Deny a pending CLI verification login
      description: >
        Denies a pending CLI login from the authenticated web session. The
        waiting terminal receives an `access_denied` polling response.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DenyDeviceCodeRequest"
      responses:
        "200":
          description: Device verification denied
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/DeviceApprovalResponse"
        "400":
          description: Invalid or expired verification code
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorEnvelope"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /v1/cli-auth/tokens:
    get:
      operationId: listCliTokens
      tags: [CLIAuth]
      summary: List CLI tokens
      description: Lists active CLI tokens owned by the authenticated user.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: Active CLI tokens
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListCLITokensResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createCliToken
      tags: [CLIAuth]
      summary: Create a CLI token
      description: Creates a long-lived CLI token and returns the raw token exactly once.
      security:
        - bearerJWT: []
      requestBody:
        required: false
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateCLITokenRequest"
      responses:
        "201":
          description: CLI token created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CreateCLITokenResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/cli-auth/tokens/{id}:
    delete:
      operationId: revokeCliToken
      tags: [CLIAuth]
      summary: Revoke a CLI token
      security:
        - bearerJWT: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
            format: uuid
      responses:
        "204":
          description: CLI token revoked
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "404":
          $ref: "#/components/responses/NotFoundError"

  # ---------------------------------------------------------------------------
  # Workspace
  # ---------------------------------------------------------------------------
  /v1/workspaces/{workspaceID}/auth-check:
    get:
      operationId: checkWorkspaceAccess
      tags: [Workspace]
      summary: Verify workspace access
      description: Returns success if the caller has access to the specified workspace.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
      responses:
        "200":
          description: Workspace access confirmed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceAccessCheckResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"

  # ---------------------------------------------------------------------------
  # User Profile
  # ---------------------------------------------------------------------------
  /v1/users/me:
    get:
      operationId: getUserProfile
      tags: [UserProfile]
      summary: Get current user profile
      description: >
        Returns the authenticated user's profile with full org/workspace
        hierarchy including roles at each level.
      security:
        - bearerJWT: []
      responses:
        "200":
          description: User profile
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserProfileResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # Onboarding
  # ---------------------------------------------------------------------------
  /v1/onboarding:
    post:
      operationId: onboard
      tags: [Onboarding]
      summary: First-time onboarding
      description: >
        Creates a new organization and workspace for a first-time user.
        Fails if the user already has an organization.
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/OnboardRequest"
      responses:
        "201":
          description: Onboarding complete
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OnboardResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"

  # ---------------------------------------------------------------------------
  # Organizations
  # ---------------------------------------------------------------------------
  /v1/organizations:
    get:
      operationId: listOrganizations
      tags: [Organizations]
      summary: List organizations
      description: Lists organizations the caller belongs to.
      security:
        - bearerJWT: []
      parameters:
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of organizations
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrganizationsResponse"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "500":
          $ref: "#/components/responses/InternalError"
    post:
      operationId: createOrganization
      tags: [Organizations]
      summary: Create an organization
      security:
        - bearerJWT: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateOrganizationRequest"
      responses:
        "201":
          description: Organization created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"
        "500":
          $ref: "#/components/responses/InternalError"

  /v1/organizations/{organizationID}:
    get:
      operationId: getOrganization
      tags: [Organizations]
      summary: Get an organization
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
      responses:
        "200":
          description: Organization details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      operationId: updateOrganization
      tags: [Organizations]
      summary: Update an organization
      description: Requires org_admin role. Setting status to archived cascades to all workspaces.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrganizationRequest"
      responses:
        "200":
          description: Organization updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrganizationResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /v1/organizations/{organizationID}/workspaces:
    get:
      operationId: listOrganizationWorkspaces
      tags: [Organizations]
      summary: List workspaces in an organization
      description: org_admin sees all workspaces; org_member sees only their own.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of workspaces
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspacesResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: createWorkspace
      tags: [Organizations]
      summary: Create a workspace in an organization
      description: Requires org_admin role.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateWorkspaceRequest"
      responses:
        "201":
          description: Workspace created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  # ---------------------------------------------------------------------------
  # Organization Memberships
  # ---------------------------------------------------------------------------
  /v1/organizations/{organizationID}/memberships:
    get:
      operationId: listOrgMemberships
      tags: [OrgMemberships]
      summary: List organization memberships
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListOrgMembershipsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: inviteOrgMember
      tags: [OrgMemberships]
      summary: Invite a member to an organization
      description: Requires org_admin role.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/OrganizationID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteOrgMemberRequest"
      responses:
        "201":
          description: Member invited
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMembershipResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  /v1/organization-memberships/{membershipID}:
    patch:
      operationId: updateOrgMembership
      tags: [OrgMemberships]
      summary: Update an organization membership
      description: >
        Org admins can change role or status. Invited users can accept
        (transition invited to active). Invite expires after 7 days.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/MembershipID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateOrgMembershipRequest"
      responses:
        "200":
          description: Membership updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/OrgMembershipResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "410":
          $ref: "#/components/responses/GoneError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  # ---------------------------------------------------------------------------
  # Workspace Details
  # ---------------------------------------------------------------------------
  /v1/workspaces/{workspaceID}/details:
    get:
      operationId: getWorkspace
      tags: [Workspaces]
      summary: Get workspace details
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
      responses:
        "200":
          description: Workspace details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
    patch:
      operationId: updateWorkspace
      tags: [Workspaces]
      summary: Update workspace details
      description: Requires workspace_admin or org_admin. Setting status to archived cascades.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateWorkspaceRequest"
      responses:
        "200":
          description: Workspace updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/WorkspaceDetailResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"
        "409":
          $ref: "#/components/responses/ConflictError"
        "415":
          $ref: "#/components/responses/UnsupportedMediaType"

  # ---------------------------------------------------------------------------
  # Workspace Memberships
  # ---------------------------------------------------------------------------
  /v1/workspaces/{workspaceID}/memberships:
    get:
      operationId: listWorkspaceMemberships
      tags: [WorkspaceMemberships]
      summary: List workspace memberships
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
        - name: limit
          in: query
          schema:
            type: integer
            format: int32
            default: 50
            minimum: 1
            maximum: 100
        - name: offset
          in: query
          schema:
            type: integer
            format: int32
            default: 0
            minimum: 0
      responses:
        "200":
          description: Paginated list of memberships
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListWorkspaceMembershipsResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
    post:
      operationId: inviteWorkspaceMember
      tags: [WorkspaceMemberships]
      summary: Invite a member to a workspace
      description: Requires workspace_admin or org_admin. User must have active org membership first.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/InviteWorkspaceMemberRequest"
