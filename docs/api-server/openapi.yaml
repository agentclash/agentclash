  /v1/workspaces/{workspaceID}/runs/{runID}/failures:
    get:
      operationId: listRunFailures
      tags: [Runs]
      summary: List failure review items for a run
      description: >
        Returns a normalized, cursor-paginated stream of per-case failure review
        items for the selected run.
      security:
        - bearerJWT: []
      parameters:
        - $ref: "#/components/parameters/WorkspaceID"
        - $ref: "#/components/parameters/RunID"
        - name: agent_id
          in: query
          description: Limit results to a single run agent.
          schema:
            type: string
            format: uuid
        - name: severity
          in: query
          description: Filter by derived failure severity.
          schema:
            type: string
            enum: [info, warning, blocking]
        - name: failure_class
          in: query
          description: Filter by the inferred failure classification.
          schema:
            $ref: "#/components/schemas/FailureReviewFailureClass"
        - name: evidence_tier
          in: query
          description: Filter by available evidence fidelity.
          schema:
            $ref: "#/components/schemas/FailureReviewEvidenceTier"
        - name: challenge_key
          in: query
          description: Limit results to a single challenge key.
          schema:
            type: string
        - name: case_key
          in: query
          description: Limit results to a single case key.
          schema:
            type: string
        - name: cursor
          in: query
          description: Opaque base64url-encoded pagination cursor returned by a previous response.
          schema:
            type: string
        - name: limit
          in: query
          description: Page size. Defaults to 50 and is capped at 200.
          schema:
            type: integer
            default: 50
            minimum: 1
            maximum: 200
      responses:
        "200":
          description: Paginated list of failure review items
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ListRunFailuresResponse"
        "400":
          $ref: "#/components/responses/ValidationError"
        "401":
          $ref: "#/components/responses/UnauthorizedError"
        "403":
          $ref: "#/components/responses/ForbiddenError"
        "404":
          $ref: "#/components/responses/NotFoundError"

