services:
  postgres:
    image: postgres:17-alpine
    container_name: agentclash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentclash
      POSTGRES_USER: agentclash
      POSTGRES_PASSWORD: agentclash
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentclash -d agentclash"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentclash-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

volumes:
  postgres-data:
  redis-data:
