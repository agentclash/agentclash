services:
  postgres:
    image: postgres:17-alpine
    container_name: agentclash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentclash
      POSTGRES_USER: agentclash
      POSTGRES_PASSWORD: agentclash
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentclash -d agentclash"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

volumes:
  postgres-data:
