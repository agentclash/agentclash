services:
  postgres:
    image: postgres:17-alpine
    container_name: agentclash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentclash
      POSTGRES_USER: agentclash
      POSTGRES_PASSWORD: agentclash
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentclash -d agentclash"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: agentclash-redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - redis-data:/data

  temporal:
    # Single-container Temporal dev server (SQLite-backed, no external DB needed).
    # Lets contributors run the full stack WITHOUT installing the host `temporal`
    # CLI. State is ephemeral by design — restart for a clean namespace.
    # start-local-stack.sh starts this service and waits for port 7233; it falls
    # back to the host CLI only if the container does not come up.
    image: temporalio/temporal:1.7.2
    container_name: agentclash-temporal
    restart: unless-stopped
    command:
      - server
      - start-dev
      - --ip
      - 0.0.0.0       # bind the gRPC frontend so the host can reach 7233
      - --ui-ip
      - 0.0.0.0       # bind the Web UI so the host can reach 8233
      - --namespace
      - default
    ports:
      - "7233:7233"   # gRPC frontend
      - "8233:8233"   # Web UI

volumes:
  postgres-data:
  redis-data:
