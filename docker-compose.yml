services:
  postgres:
    image: postgres:17-alpine
    container_name: agentclash-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: agentclash
      POSTGRES_USER: agentclash
      POSTGRES_PASSWORD: agentclash
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U agentclash -d agentclash"]
      interval: 5s
      timeout: 5s
      retries: 10
    volumes:
      - postgres-data:/var/lib/postgresql/data

  reasoning:
    build:
      context: ./reasoning
      dockerfile: Dockerfile
    container_name: agentclash-reasoning
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      REASONING_HOST: "0.0.0.0"
      REASONING_PORT: "8000"
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/healthz')"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres-data:
