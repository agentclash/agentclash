version: "2"
sql:
  - engine: "postgresql"
    schema: "db/migrations"
    queries:
      - "db/queries/run_creation.sql"
      - "db/queries/runs.sql"
      - "db/queries/run_agents.sql"
      - "db/queries/worker_execution_context.sql"
      - "db/queries/hosted_runs.sql"
      - "db/queries/run_events.sql"
      - "db/queries/replay_reads.sql"
      - "db/queries/evaluation_specs.sql"
      - "db/queries/scoring_results.sql"
      - "db/queries/run_comparisons.sql"
      - "db/queries/agent_deployments.sql"
      - "db/queries/challenge_packs.sql"
    gen:
      go:
        package: "sqlc"
        out: "internal/repository/sqlc"
        sql_package: "pgx/v5"
        emit_interface: true
        emit_pointers_for_null_types: true
        omit_unused_structs: true
        query_parameter_limit: 0
        overrides:
          - db_type: "uuid"
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
          - db_type: "uuid"
            nullable: true
            go_type:
              import: "github.com/google/uuid"
              type: "UUID"
              pointer: true
