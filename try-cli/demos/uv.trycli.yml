name: "uv"
slug: uv
docs: "https://docs.astral.sh/uv/"
github: "https://github.com/astral-sh/uv"

install:
  - "curl -LsSf https://astral.sh/uv/install.sh | sh"
  - "echo 'export PATH=\"$HOME/.local/bin:$PATH\"' >> ~/.bashrc && export PATH=\"$HOME/.local/bin:$PATH\""

welcome: |
  uv is ready! Blazing-fast Python package manager.
  Try:
    uv --version
    uv init demo && cd demo
    uv add requests

commands:
  - label: "Show version"
    run: "uv --version"
  - label: "Init a project"
    run: "uv init demo && cd demo"
  - label: "Create venv & run Python"
    run: "uv venv && source .venv/bin/activate && python -c 'print(\"Hello from uv!\")'"
  - label: "Add a package"
    run: "uv init pkgdemo && cd pkgdemo && uv add rich && uv run python -c 'import rich; rich.print(\"[bold green]uv works![/]\")'"

sessionMinutes: 10
