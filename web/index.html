<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AgentClash - Live Race Telemetry</title>
<style>
  :root {
    --bg: #0a0a0f;
    --surface: #12121a;
    --surface2: #1a1a25;
    --surface3: #22222f;
    --border: #2a2a3a;
    --text: #e0e0e8;
    --text-dim: #8888a0;
    --accent: #00d4ff;
    --green: #00ff88;
    --red: #ff4466;
    --yellow: #ffcc00;
    --orange: #ff8833;
    --purple: #aa66ff;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    font-family: 'SF Mono', 'Fira Code', 'Consolas', monospace;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* === HEADER === */
  .header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 12px 24px;
    border-bottom: 1px solid var(--border);
    background: var(--surface);
    z-index: 10;
  }

  .header h1 {
    font-size: 18px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .header h1 span { color: var(--accent); }

  .race-status {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
  }

  .status-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: var(--text-dim);
  }

  .status-dot.live {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: pulse 1.5s infinite;
  }

  @keyframes pulse {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.4; }
  }

  .controls { display: flex; gap: 10px; align-items: center; }

  .btn {
    padding: 8px 18px;
    border: 1px solid var(--accent);
    background: transparent;
    color: var(--accent);
    font-family: inherit;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    cursor: pointer;
    transition: all 0.2s;
  }

  .btn:hover { background: var(--accent); color: var(--bg); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn:disabled:hover { background: transparent; color: var(--accent); }

  .btn-sm {
    padding: 4px 12px;
    font-size: 10px;
  }

  .timer {
    font-size: 22px;
    font-weight: 700;
    color: var(--accent);
    font-variant-numeric: tabular-nums;
  }

  .connection-badge {
    font-size: 10px;
    padding: 3px 8px;
    border: 1px solid var(--border);
    color: var(--text-dim);
  }
  .connection-badge.connected { border-color: var(--green); color: var(--green); }
  .connection-badge.disconnected { border-color: var(--red); color: var(--red); }

  /* === MAIN LAYOUT === */
  .main {
    display: grid;
    grid-template-columns: 1fr 420px;
    grid-template-rows: auto 1fr;
    gap: 0;
    height: calc(100vh - 49px);
  }

  /* === CHALLENGE PANEL === */
  .challenge-panel {
    grid-column: 1 / -1;
    padding: 10px 24px;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    display: none;
  }
  .challenge-panel.visible { display: block; }

  .challenge-panel h3 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 4px;
  }

  .challenge-panel pre {
    font-size: 11px;
    line-height: 1.4;
    color: var(--text);
    white-space: pre-wrap;
    max-height: 100px;
    overflow-y: auto;
  }

  /* === AGENTS AREA === */
  .agents-area {
    padding: 16px 24px;
    overflow-y: auto;
  }

  .agents-area h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
    margin-bottom: 12px;
  }

  .agents-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
    gap: 10px;
  }

  /* === AGENT CARD === */
  .agent-card {
    background: var(--surface);
    border: 1px solid var(--border);
    padding: 12px;
    position: relative;
    overflow: hidden;
    cursor: pointer;
    transition: border-color 0.2s, transform 0.1s;
  }

  .agent-card:hover { border-color: var(--text-dim); transform: translateY(-1px); }
  .agent-card.selected { border-color: var(--accent); }

  .agent-card::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: var(--text-dim);
    transition: background 0.3s;
  }

  .agent-card.thinking::before { background: var(--yellow); box-shadow: 0 0 10px var(--yellow); }
  .agent-card.acting::before { background: var(--orange); box-shadow: 0 0 10px var(--orange); }
  .agent-card.finished::before { background: var(--green); box-shadow: 0 0 10px var(--green); }
  .agent-card.error::before { background: var(--red); box-shadow: 0 0 10px var(--red); }

  .agent-name { font-size: 13px; font-weight: 700; margin-bottom: 2px; }
  .agent-model { font-size: 10px; color: var(--text-dim); margin-bottom: 8px; }

  .agent-stats { display: grid; grid-template-columns: 1fr 1fr 1fr; gap: 4px; }
  .stat { display: flex; flex-direction: column; }
  .stat-label { font-size: 8px; text-transform: uppercase; letter-spacing: 1px; color: var(--text-dim); }
  .stat-value { font-size: 13px; font-weight: 600; font-variant-numeric: tabular-nums; }

  .agent-status-text {
    margin-top: 6px;
    padding-top: 6px;
    border-top: 1px solid var(--border);
    font-size: 10px;
    color: var(--text-dim);
    min-height: 16px;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .agent-status-text.active { color: var(--yellow); }

  /* === RIGHT PANEL (Feed / Trajectory) === */
  .right-panel {
    border-left: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    background: var(--surface);
    overflow: hidden;
  }

  .panel-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    min-height: 38px;
  }

  .panel-header h2 {
    font-size: 11px;
    text-transform: uppercase;
    letter-spacing: 1.5px;
    color: var(--text-dim);
  }

  .panel-tabs {
    display: flex;
    gap: 0;
  }

  .panel-tab {
    padding: 4px 12px;
    font-size: 10px;
    font-family: inherit;
    font-weight: 600;
    letter-spacing: 1px;
    text-transform: uppercase;
    border: 1px solid var(--border);
    background: transparent;
    color: var(--text-dim);
    cursor: pointer;
  }

  .panel-tab:first-child { border-right: none; }
  .panel-tab.active { background: var(--surface2); color: var(--text); border-color: var(--text-dim); }

  .panel-content {
    flex: 1;
    overflow-y: auto;
  }

  /* === FEED === */
  .feed-list { padding: 4px 0; }

  .feed-item {
    padding: 5px 16px;
    font-size: 10px;
    line-height: 1.4;
    border-bottom: 1px solid rgba(42,42,58,0.4);
    animation: fadeIn 0.2s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(-3px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .feed-time { color: var(--text-dim); margin-right: 6px; font-variant-numeric: tabular-nums; }
  .feed-agent { font-weight: 600; margin-right: 4px; }

  .feed-item.thinking .feed-agent { color: var(--yellow); }
  .feed-item.acted .feed-agent { color: var(--orange); }
  .feed-item.finished .feed-agent { color: var(--green); }
  .feed-item.error .feed-agent { color: var(--red); }
  .feed-item.race .feed-agent { color: var(--accent); }

  .feed-detail { color: var(--text-dim); }

  /* === TRAJECTORY === */
  .trajectory { padding: 0; }

  .traj-agent-header {
    padding: 12px 16px;
    border-bottom: 1px solid var(--border);
    background: var(--surface2);
  }

  .traj-agent-header .name { font-size: 14px; font-weight: 700; }
  .traj-agent-header .meta { font-size: 10px; color: var(--text-dim); margin-top: 2px; }

  .traj-empty {
    padding: 40px 16px;
    text-align: center;
    color: var(--text-dim);
    font-size: 12px;
  }

  .traj-step {
    border-bottom: 1px solid var(--border);
    animation: fadeIn 0.2s ease;
  }

  .traj-step-header {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 8px 16px;
    cursor: pointer;
    font-size: 11px;
    transition: background 0.15s;
  }

  .traj-step-header:hover { background: var(--surface2); }

  .traj-step-num {
    font-size: 9px;
    font-weight: 700;
    color: var(--text-dim);
    min-width: 20px;
  }

  .traj-step-type {
    font-size: 9px;
    font-weight: 700;
    letter-spacing: 1px;
    text-transform: uppercase;
    padding: 1px 6px;
    border-radius: 2px;
  }

  .traj-step-type.think { background: rgba(255,204,0,0.15); color: var(--yellow); }
  .traj-step-type.act { background: rgba(255,136,51,0.15); color: var(--orange); }
  .traj-step-type.observe { background: rgba(0,212,255,0.15); color: var(--accent); }
  .traj-step-type.finish { background: rgba(0,255,136,0.15); color: var(--green); }
  .traj-step-type.error { background: rgba(255,68,102,0.15); color: var(--red); }

  .traj-step-summary {
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
    color: var(--text);
  }

  .traj-step-time { font-size: 9px; color: var(--text-dim); font-variant-numeric: tabular-nums; }

  .traj-step-detail {
    display: none;
    padding: 8px 16px 12px 44px;
    font-size: 10px;
    line-height: 1.5;
    background: var(--surface2);
    border-top: 1px solid var(--border);
  }

  .traj-step.expanded .traj-step-detail { display: block; }

  .traj-step-detail pre {
    background: var(--bg);
    padding: 8px 10px;
    margin: 4px 0;
    overflow-x: auto;
    font-size: 10px;
    line-height: 1.4;
    white-space: pre-wrap;
    word-break: break-all;
    max-height: 200px;
    overflow-y: auto;
    border: 1px solid var(--border);
  }

  .traj-label {
    font-size: 9px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.5px;
    color: var(--text-dim);
    margin-top: 6px;
    margin-bottom: 2px;
  }

  .traj-label:first-child { margin-top: 0; }

  .traj-badge {
    display: inline-block;
    font-size: 9px;
    padding: 1px 6px;
    border-radius: 2px;
    margin-left: 4px;
  }
  .traj-badge.success { background: rgba(0,255,136,0.15); color: var(--green); }
  .traj-badge.fail { background: rgba(255,68,102,0.15); color: var(--red); }

  /* === STANDINGS === */
  .standings {
    display: none;
    grid-column: 1 / -1;
    padding: 24px;
    background: var(--surface);
    overflow-y: auto;
  }
  .standings.visible { display: block; }

  .standings h2 {
    font-size: 16px;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 2px;
    margin-bottom: 16px;
    color: var(--accent);
  }

  .results-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .results-table th {
    text-align: left;
    font-size: 9px;
    text-transform: uppercase;
    letter-spacing: 1px;
    color: var(--text-dim);
    padding: 6px 10px;
    border-bottom: 1px solid var(--border);
  }
  .results-table td {
    padding: 8px 10px;
    border-bottom: 1px solid rgba(42,42,58,0.5);
    font-variant-numeric: tabular-nums;
  }
  .results-table tr:first-child td { color: var(--green); font-weight: 700; }
  .rank-1 { color: var(--green); }
  .rank-2 { color: var(--accent); }
  .rank-3 { color: var(--yellow); }

  /* === IDLE === */
  .idle-screen {
    grid-column: 1 / -1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 16px;
    color: var(--text-dim);
  }
  .idle-screen .logo {
    font-size: 48px;
    font-weight: 900;
    letter-spacing: 6px;
    text-transform: uppercase;
    color: var(--surface2);
  }
  .idle-screen .logo span { color: var(--accent); opacity: 0.3; }
  .idle-screen p { font-size: 13px; }

  /* === SCROLLBAR === */
  ::-webkit-scrollbar { width: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-dim); }
</style>
</head>
<body>

<div class="header">
  <h1>Agent<span>Clash</span></h1>
  <div class="race-status">
    <div class="status-dot" id="statusDot"></div>
    <span id="statusText">IDLE</span>
    <span class="timer" id="timer">00:00</span>
  </div>
  <div class="controls">
    <span class="connection-badge" id="connBadge">DISCONNECTED</span>
    <button class="btn" id="startBtn" onclick="startRace()">Start Race</button>
  </div>
</div>

<div class="main" id="mainArea">
  <div class="idle-screen" id="idleScreen">
    <div class="logo">Agent<span>Clash</span></div>
    <p>Press START RACE to begin</p>
  </div>
</div>

<template id="raceTemplate">
  <div class="challenge-panel" id="challengePanel">
    <h3>Challenge</h3>
    <pre id="challengeText"></pre>
  </div>
  <div class="agents-area">
    <h2>Agents</h2>
    <div class="agents-grid" id="agentsGrid"></div>
  </div>
  <div class="right-panel">
    <div class="panel-header">
      <div class="panel-tabs">
        <button class="panel-tab active" id="tabFeed" onclick="showPanel('feed')">Live Feed</button>
        <button class="panel-tab" id="tabTrajectory" onclick="showPanel('trajectory')">Trajectory</button>
      </div>
    </div>
    <div class="panel-content" id="panelContent">
      <div id="feedPanel">
        <div class="feed-list" id="feedList"></div>
      </div>
      <div id="trajectoryPanel" style="display:none">
        <div class="trajectory" id="trajectoryView">
          <div class="traj-empty">Click an agent card to view its trajectory</div>
        </div>
      </div>
    </div>
  </div>
</template>

<template id="standingsTemplate">
  <div class="standings visible" id="standingsPanel">
    <h2>Final Standings</h2>
    <table class="results-table">
      <thead>
        <tr>
          <th>Rank</th>
          <th>Agent</th>
          <th>Model</th>
          <th>Score</th>
          <th>Time</th>
          <th>Tokens</th>
          <th>Steps</th>
          <th>Submitted</th>
        </tr>
      </thead>
      <tbody id="resultsBody"></tbody>
    </table>
  </div>
</template>

<script>
const state = {
  racing: false,
  agents: {},
  trajectories: {},  // name -> [events]
  selectedAgent: null,
  activePanel: 'feed',
  startTime: null,
  timerInterval: null,
};

const AGENT_COLORS = ['#00d4ff', '#00ff88', '#ff4466', '#ffcc00', '#ff8833', '#aa66ff', '#44ddaa', '#ff66aa'];
let agentColorMap = {};
let evtSource = null;

// === SSE ===
function connectSSE() {
  if (evtSource) evtSource.close();
  evtSource = new EventSource('/api/events');

  evtSource.onopen = () => {
    document.getElementById('connBadge').textContent = 'CONNECTED';
    document.getElementById('connBadge').className = 'connection-badge connected';
  };

  evtSource.onerror = () => {
    document.getElementById('connBadge').textContent = 'DISCONNECTED';
    document.getElementById('connBadge').className = 'connection-badge disconnected';
  };

  evtSource.onmessage = (e) => {
    try { handleEvent(JSON.parse(e.data)); }
    catch (err) { console.error('Parse error:', err); }
  };
}

// === EVENTS ===
function handleEvent(evt) {
  const type = evt.type;
  const agent = evt.agent || '';
  const data = evt.data || {};

  switch (type) {
    case 'race_started': onRaceStarted(data); break;
    case 'agent_started':
      updateAgent(agent, { status: 'started', model: data.model, statusText: 'Initializing...' });
      addTrajectoryEvent(agent, { type: 'start', model: data.model, time: evt.timestamp });
      addFeed('race', agent, 'joined', data.model);
      break;
    case 'agent_thinking':
      updateAgent(agent, { status: 'thinking', statusText: `Thinking...` });
      break;
    case 'agent_thought':
      updateAgent(agent, {
        status: 'thinking',
        tokens: (state.agents[agent]?.tokens || 0) + (data.tokens || 0),
        statusText: `${data.tool_calls || 0} tool calls planned`,
      });
      addTrajectoryEvent(agent, {
        type: 'think',
        tokens: data.tokens,
        duration_ms: data.duration_ms,
        content: data.content,
        tool_calls: data.tool_calls,
        planned_tools: data.planned_tools || [],
        time: evt.timestamp,
      });
      addFeed('thinking', agent, 'thought',
        `${data.tool_calls || 0} calls, ${fmtNum(data.tokens)} tok, ${data.duration_ms}ms`);
      break;
    case 'agent_acted':
      updateAgent(agent, {
        status: 'acting',
        steps: (state.agents[agent]?.steps || 0) + 1,
        lastTool: data.tool,
        statusText: `${data.tool} ${data.success ? 'OK' : 'FAIL'}`,
      });
      addTrajectoryEvent(agent, {
        type: 'act',
        tool: data.tool,
        input: data.input,
        output: data.output,
        error: data.error,
        success: data.success,
        category: data.category,
        duration_ms: data.duration_ms,
        time: evt.timestamp,
      });
      addFeed('acted', agent, data.tool,
        `${data.success ? 'OK' : 'FAIL'} ${data.duration_ms}ms`);
      break;
    case 'agent_observed':
      addTrajectoryEvent(agent, {
        type: 'observe',
        standings: data.standings,
        time: evt.timestamp,
      });
      addFeed('race', agent, 'standings injected', '');
      break;
    case 'agent_finished':
      updateAgent(agent, {
        status: 'finished',
        statusText: data.submitted ? 'SUBMITTED' : 'Stopped',
      });
      addTrajectoryEvent(agent, {
        type: 'finish',
        submitted: data.submitted,
        explanation: data.explanation,
        time: evt.timestamp,
      });
      addFeed('finished', agent, data.submitted ? 'SUBMITTED' : 'stopped',
        data.explanation ? data.explanation.substring(0, 80) : '');
      break;
    case 'agent_error':
      updateAgent(agent, { status: 'error', statusText: `Error: ${data.error}` });
      addTrajectoryEvent(agent, { type: 'error', error: data.error, time: evt.timestamp });
      addFeed('error', agent, 'ERROR', data.error);
      break;
    case 'race_completed': onRaceCompleted(data); break;
    case 'race_error': addFeed('error', 'RACE', 'ERROR', data.error); break;
  }

  // Auto-refresh trajectory if this agent is selected
  if (agent && agent === state.selectedAgent) {
    renderTrajectory(agent);
  }
}

// === RACE LIFECYCLE ===
function onRaceStarted(data) {
  state.racing = true;
  state.startTime = Date.now();
  state.agents = {};
  state.trajectories = {};
  state.selectedAgent = null;
  agentColorMap = {};

  const agents = data.agents || [];
  const models = data.models || [];
  agents.forEach((name, i) => {
    agentColorMap[name] = AGENT_COLORS[i % AGENT_COLORS.length];
    state.agents[name] = {
      model: models[i] || '', steps: 0, tokens: 0,
      lastTool: '-', status: 'waiting', statusText: 'Waiting...',
    };
    state.trajectories[name] = [];
  });

  const main = document.getElementById('mainArea');
  main.innerHTML = '';
  main.appendChild(document.getElementById('raceTemplate').content.cloneNode(true));

  if (data.challenge) {
    document.getElementById('challengePanel').classList.add('visible');
    document.getElementById('challengeText').textContent = data.challenge.substring(0, 2000);
  }

  renderAgentCards();

  document.getElementById('statusDot').classList.add('live');
  document.getElementById('statusText').textContent = 'LIVE';
  document.getElementById('startBtn').disabled = true;
  startTimer();

  addFeed('race', 'RACE', 'STARTED',
    `${agents.length} agents, ${data.time_limit ? Math.round(data.time_limit) + 's' : ''}`);
}

function onRaceCompleted(data) {
  state.racing = false;
  stopTimer();
  document.getElementById('statusDot').classList.remove('live');
  document.getElementById('statusText').textContent = 'FINISHED';
  document.getElementById('startBtn').disabled = false;

  addFeed('finished', 'RACE', 'COMPLETED', '');

  if (data && Array.isArray(data)) {
    const main = document.getElementById('mainArea');
    main.appendChild(document.getElementById('standingsTemplate').content.cloneNode(true));

    const body = document.getElementById('resultsBody');
    data.forEach((r, i) => {
      const tr = document.createElement('tr');
      const rc = i < 3 ? `rank-${i + 1}` : '';
      const dur = r.Duration ? (r.Duration / 1e9).toFixed(0) + 's' : '-';
      tr.innerHTML = `
        <td class="${rc}">#${r.Rank || i + 1}</td>
        <td>${esc(r.AgentName || r.Agent || r.Name || '')}</td>
        <td style="color:var(--text-dim)">${esc(r.Model || '')}</td>
        <td>${(r.FinalScore || r.TotalScore || r.Score || 0).toFixed(1)}</td>
        <td>${dur}</td>
        <td>${fmtNum(r.TotalTokens || 0)}</td>
        <td>${r.TotalSteps || 0}</td>
        <td>${r.Submitted ? 'Yes' : 'No'}</td>
      `;
      body.appendChild(tr);
    });
  }
}

// === AGENT CARDS ===
function renderAgentCards() {
  const grid = document.getElementById('agentsGrid');
  if (!grid) return;
  grid.innerHTML = '';

  for (const [name, info] of Object.entries(state.agents)) {
    const color = agentColorMap[name] || '#888';
    const card = document.createElement('div');
    card.className = `agent-card ${info.status}`;
    card.id = `agent-${cid(name)}`;
    card.onclick = () => selectAgent(name);
    card.innerHTML = `
      <div class="agent-name" style="color:${color}">${esc(name)}</div>
      <div class="agent-model">${esc(info.model)}</div>
      <div class="agent-stats">
        <div class="stat">
          <span class="stat-label">Steps</span>
          <span class="stat-value" id="steps-${cid(name)}">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Tokens</span>
          <span class="stat-value" id="tokens-${cid(name)}">0</span>
        </div>
        <div class="stat">
          <span class="stat-label">Last Tool</span>
          <span class="stat-value" id="tool-${cid(name)}" style="font-size:10px">-</span>
        </div>
      </div>
      <div class="agent-status-text" id="stext-${cid(name)}">${esc(info.statusText)}</div>
    `;
    grid.appendChild(card);
  }
}

function updateAgent(name, updates) {
  if (!state.agents[name]) {
    state.agents[name] = { model: '', steps: 0, tokens: 0, lastTool: '-', status: 'waiting', statusText: '' };
  }
  Object.assign(state.agents[name], updates);
  const info = state.agents[name];

  const card = document.getElementById(`agent-${cid(name)}`);
  if (card) {
    card.className = `agent-card ${info.status}` + (state.selectedAgent === name ? ' selected' : '');
  }

  setVal(`steps-${cid(name)}`, info.steps);
  setVal(`tokens-${cid(name)}`, fmtNum(info.tokens));
  setVal(`tool-${cid(name)}`, info.lastTool || '-');

  const st = document.getElementById(`stext-${cid(name)}`);
  if (st) {
    st.textContent = info.statusText || '';
    st.className = 'agent-status-text' + (['thinking','acting'].includes(info.status) ? ' active' : '');
  }
}

// === AGENT SELECTION / TRAJECTORY ===
function selectAgent(name) {
  // Deselect if clicking same agent
  if (state.selectedAgent === name) {
    state.selectedAgent = null;
    document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
    showPanel('feed');
    return;
  }

  state.selectedAgent = name;

  // Highlight card
  document.querySelectorAll('.agent-card').forEach(c => c.classList.remove('selected'));
  const card = document.getElementById(`agent-${cid(name)}`);
  if (card) card.classList.add('selected');

  // Switch to trajectory panel
  showPanel('trajectory');
  renderTrajectory(name);
}

function showPanel(panel) {
  state.activePanel = panel;
  const feedEl = document.getElementById('feedPanel');
  const trajEl = document.getElementById('trajectoryPanel');
  const tabFeed = document.getElementById('tabFeed');
  const tabTraj = document.getElementById('tabTrajectory');

  if (!feedEl) return;

  if (panel === 'feed') {
    feedEl.style.display = '';
    trajEl.style.display = 'none';
    tabFeed.classList.add('active');
    tabTraj.classList.remove('active');
  } else {
    feedEl.style.display = 'none';
    trajEl.style.display = '';
    tabFeed.classList.remove('active');
    tabTraj.classList.add('active');
    if (state.selectedAgent) renderTrajectory(state.selectedAgent);
  }
}

function addTrajectoryEvent(agent, evt) {
  if (!state.trajectories[agent]) state.trajectories[agent] = [];
  state.trajectories[agent].push(evt);
}

function renderTrajectory(name) {
  const view = document.getElementById('trajectoryView');
  if (!view) return;

  const events = state.trajectories[name] || [];
  const info = state.agents[name] || {};
  const color = agentColorMap[name] || '#888';

  if (events.length === 0) {
    view.innerHTML = `<div class="traj-empty">No events yet for ${esc(name)}</div>`;
    return;
  }

  let html = `<div class="traj-agent-header">
    <div class="name" style="color:${color}">${esc(name)}</div>
    <div class="meta">${esc(info.model || '')} | ${events.length} events | ${fmtNum(info.tokens || 0)} tokens | ${info.steps || 0} steps</div>
  </div>`;

  let stepNum = 0;
  for (let i = 0; i < events.length; i++) {
    const e = events[i];
    stepNum++;

    switch (e.type) {
      case 'think': {
        const tools = e.planned_tools?.length ? e.planned_tools.join(', ') : 'none';
        html += `<div class="traj-step" id="tstep-${name}-${i}">
          <div class="traj-step-header" onclick="toggleStep('${cid(name)}',${i})">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type think">THINK</span>
            <span class="traj-step-summary">${fmtNum(e.tokens)} tok, ${e.tool_calls} calls planned: ${esc(tools)}</span>
            <span class="traj-step-time">${e.duration_ms}ms</span>
          </div>
          <div class="traj-step-detail">
            <div class="traj-label">LLM Response</div>
            <pre>${esc(e.content || '(no text content)')}</pre>
            <div class="traj-label">Planned Tools: ${esc(tools)}</div>
          </div>
        </div>`;
        break;
      }
      case 'act': {
        const badge = e.success ? '<span class="traj-badge success">OK</span>' : '<span class="traj-badge fail">FAIL</span>';
        html += `<div class="traj-step" id="tstep-${cid(name)}-${i}">
          <div class="traj-step-header" onclick="toggleStep('${cid(name)}',${i})">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type act">ACT</span>
            <span class="traj-step-summary">${esc(e.tool)} ${badge}</span>
            <span class="traj-step-time">${e.duration_ms}ms</span>
          </div>
          <div class="traj-step-detail">
            <div class="traj-label">Tool: ${esc(e.tool)} (${esc(e.category || '')})</div>
            <div class="traj-label">Input</div>
            <pre>${esc(formatJSON(e.input))}</pre>
            <div class="traj-label">Output</div>
            <pre>${esc(e.success ? (e.output || '(empty)') : (e.error || e.output || '(empty)'))}</pre>
          </div>
        </div>`;
        break;
      }
      case 'observe': {
        html += `<div class="traj-step" id="tstep-${cid(name)}-${i}">
          <div class="traj-step-header" onclick="toggleStep('${cid(name)}',${i})">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type observe">RACE</span>
            <span class="traj-step-summary">Standings injected</span>
            <span class="traj-step-time"></span>
          </div>
          <div class="traj-step-detail">
            <pre>${esc(e.standings || '')}</pre>
          </div>
        </div>`;
        break;
      }
      case 'finish': {
        html += `<div class="traj-step" id="tstep-${cid(name)}-${i}">
          <div class="traj-step-header" onclick="toggleStep('${cid(name)}',${i})">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type finish">${e.submitted ? 'SUBMIT' : 'STOP'}</span>
            <span class="traj-step-summary">${e.submitted ? 'Solution submitted' : 'Stopped without submission'}</span>
            <span class="traj-step-time"></span>
          </div>
          <div class="traj-step-detail">
            ${e.explanation ? `<div class="traj-label">Explanation</div><pre>${esc(e.explanation)}</pre>` : ''}
          </div>
        </div>`;
        break;
      }
      case 'error': {
        html += `<div class="traj-step">
          <div class="traj-step-header">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type error">ERR</span>
            <span class="traj-step-summary">${esc(e.error)}</span>
          </div>
        </div>`;
        break;
      }
      case 'start': {
        html += `<div class="traj-step">
          <div class="traj-step-header">
            <span class="traj-step-num">${stepNum}</span>
            <span class="traj-step-type observe">INIT</span>
            <span class="traj-step-summary">Agent started (${esc(e.model)})</span>
          </div>
        </div>`;
        break;
      }
    }
  }

  // Preserve scroll if near bottom
  const panel = document.getElementById('panelContent');
  const wasAtBottom = panel && (panel.scrollHeight - panel.scrollTop - panel.clientHeight < 60);

  view.innerHTML = html;

  if (wasAtBottom && panel) {
    panel.scrollTop = panel.scrollHeight;
  }
}

function toggleStep(agentCid, idx) {
  const el = document.getElementById(`tstep-${agentCid}-${idx}`);
  if (el) el.classList.toggle('expanded');
}

// === FEED ===
function addFeed(type, agent, action, detail) {
  const list = document.getElementById('feedList');
  if (!list) return;

  const item = document.createElement('div');
  item.className = `feed-item ${type}`;

  const now = new Date();
  const time = `${pad(now.getHours())}:${pad(now.getMinutes())}:${pad(now.getSeconds())}`;
  const color = agentColorMap[agent] || '';
  const colorStyle = color ? ` style="color:${color}"` : '';

  item.innerHTML = `<span class="feed-time">${time}</span><span class="feed-agent"${colorStyle}>${esc(agent)}</span> <span>${esc(action)}</span>${detail ? ` <span class="feed-detail">${esc(detail.substring(0, 100))}</span>` : ''}`;

  list.insertBefore(item, list.firstChild);
  while (list.children.length > 300) list.removeChild(list.lastChild);
}

// === TIMER ===
function startTimer() {
  stopTimer();
  state.timerInterval = setInterval(() => {
    const elapsed = Math.floor((Date.now() - state.startTime) / 1000);
    document.getElementById('timer').textContent = `${pad(Math.floor(elapsed / 60))}:${pad(elapsed % 60)}`;
  }, 1000);
}

function stopTimer() {
  if (state.timerInterval) { clearInterval(state.timerInterval); state.timerInterval = null; }
}

// === API ===
async function startRace() {
  const btn = document.getElementById('startBtn');
  btn.disabled = true;
  try {
    const resp = await fetch('/api/race/start', { method: 'POST' });
    if (!resp.ok) {
      alert('Failed: ' + await resp.text());
      btn.disabled = false;
    }
  } catch (err) {
    alert('Failed: ' + err.message);
    btn.disabled = false;
  }
}

// === HELPERS ===
function cid(name) { return name.replace(/[^a-zA-Z0-9]/g, '_'); }
function esc(s) { const d = document.createElement('div'); d.textContent = s || ''; return d.innerHTML; }
function pad(n) { return String(n).padStart(2, '0'); }
function fmtNum(n) { return n >= 10000 ? (n / 1000).toFixed(1) + 'k' : String(n); }
function setVal(id, val) { const el = document.getElementById(id); if (el) el.textContent = val; }

function formatJSON(s) {
  if (!s) return '(none)';
  try {
    const obj = JSON.parse(s);
    return JSON.stringify(obj, null, 2);
  } catch {
    return s;
  }
}

// === INIT ===
connectSSE();
</script>
