  <line x1="312" y1="148" x2="292" y2="190" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
  <line x1="200" y1="364" x2="220" y2="322" stroke="#ffffff" stroke-width="6" stroke-linecap="round" opacity="0.4"/>
