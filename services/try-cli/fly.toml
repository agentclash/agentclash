# Deploy: fly deploy --config services/try-cli/fly.toml
app = "agentclash-try-cli"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"
  context = "../.."

[env]
  PORT = "3001"

[http_service]
  internal_port = 3001
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "connections"
    hard_limit = 100
    soft_limit = 80
