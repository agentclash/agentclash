challenge: "races/config-maze"
time_limit: 10m
max_iterations: 30
broadcast_interval: 3  # inject race standings every 3 steps

contestants:
  # --- Direct API (lower latency) ---

  - name: "GPT-4.1"
    provider: openai
    model: gpt-4.1

  - name: "o4-mini"
    provider: openai
    model: o4-mini

  - name: "Claude Sonnet 4.6"
    provider: anthropic
    model: claude-sonnet-4-6

  - name: "Gemini 2.5 Pro"
    provider: gemini
    model: gemini-2.5-pro

  # --- Via OpenRouter ---

  - name: "DeepSeek R1"
    provider: openrouter
    model: deepseek/deepseek-r1

  - name: "Llama 4 Maverick"
    provider: openrouter
    model: meta-llama/llama-4-maverick

  - name: "Grok 3"
    provider: openrouter
    model: x-ai/grok-3-beta

  - name: "Qwen3 235B"
    provider: openrouter
    model: qwen/qwen3-235b-a22b
