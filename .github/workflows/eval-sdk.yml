name: Eval SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "sdk/typescript/**"
      - "schemas/evaltest/**"
      - "cli/**"
      - ".github/workflows/eval-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "sdk/typescript/**"
      - "schemas/evaltest/**"
      - "cli/**"
      - ".github/workflows/eval-sdk.yml"

defaults:
  run:
    working-directory: sdk/python/agentclash_eval

jobs:
  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"
        working-directory: sdk/python/agentclash_eval

      - name: Run tests
        run: pytest -q
        working-directory: sdk/python/agentclash_eval

  typescript:
    name: TypeScript SDK Spike Tests
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: sdk/typescript/evals
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: npm install
      - run: npm test
