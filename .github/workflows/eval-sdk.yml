name: Eval SDK CI

on:
  push:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "schemas/evaltest/**"
      - ".github/workflows/eval-sdk.yml"
  pull_request:
    branches: [main]
    paths:
      - "sdk/python/**"
      - "schemas/evaltest/**"
      - ".github/workflows/eval-sdk.yml"

defaults:
  run:
    working-directory: sdk/python/agentclash_eval

jobs:
  python:
    name: Python SDK Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package
        run: pip install -e ".[dev]"

      - name: Run tests
        run: pytest -q
