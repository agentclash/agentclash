name: Frontend CI

on:
  push:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"
  pull_request:
    branches: [main]
    paths:
      - "web/**"
      - ".github/workflows/frontend.yml"

defaults:
  run:
    working-directory: web

jobs:
  agentclash-comment-smoke:
    name: AgentClash PR Comment Smoke
    if: github.event_name == 'pull_request'
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pull-requests: write
    steps:
      - name: Exercise merged AgentClash CI comment path
        continue-on-error: true
        uses: agentclash/agentclash/.github/actions/agentclash-ci@main
        with:
          install-cli: "false"
          remote-validate: "false"
          manifest: .agentclash/comment-smoke-missing.yaml
          pr-comment: "true"

  lint-typecheck:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: TypeScript check
        run: npx tsc --noEmit

      - name: ESLint
        run: npm run lint

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: web/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build
