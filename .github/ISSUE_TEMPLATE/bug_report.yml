name: Bug report
description: Something isn't working as expected
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for filing a bug! For **security vulnerabilities**, do not open a public
        issue — report privately (see SECURITY.md).
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Which part of AgentClash is affected?
      options:
        - backend
        - cli
        - web
        - docs
        - other
    validations:
      required: true
  - type: textarea
    id: what
    attributes:
      label: What happened?
      description: A clear description, including what you expected vs. what actually happened.
    validations:
      required: true
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
      placeholder: |
        1.
        2.
        3.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version / commit
      description: Output of `agentclash version` if relevant, or the commit SHA.
  - type: dropdown
    id: deployment
    attributes:
      label: Hosted or self-hosted?
      options:
        - Hosted (agentclash.dev)
        - Self-hosted
        - Not sure
  - type: textarea
    id: logs
    attributes:
      label: Logs / output
      description: Relevant logs, errors, or a `--json` payload. Redact secrets.
      render: shell
  - type: checkboxes
    id: preflight
    attributes:
      label: Pre-flight
      options:
        - label: I searched existing issues for a duplicate
          required: true
