###############################################################################
# Challenge Pack: Knowledge & Reasoning Regression
#
# A cheap, fully-deterministic model-migration anchor (GPQA/MMLU-style). The
# agent answers hard multiple-choice questions with ONLY the letter; a single
# normalized_match validator compares the answer to each case's expected letter,
# so accuracy = fraction of cases answered correctly. Run this on every model
# upgrade to catch silent reasoning regressions.
#
# Swap points (make it yours): replace the cases with your own questions +
# expected answers. The one validator scales to any number of cases.
###############################################################################

pack:
  slug: knowledge-reasoning-regression
  name: Knowledge & Reasoning Regression
  family: reasoning
  description: >-
    A cheap deterministic regression anchor: hard multiple-choice questions
    graded by exact-letter match. Accuracy = fraction correct. Ideal for
    catching reasoning regressions across model upgrades.

version:
  number: 1
  execution_mode: prompt_eval

  evaluation_spec:
    name: knowledge-reasoning-regression-v1
    version_number: 1
    judge_mode: deterministic

    validators:
      # One validator across every case: compare the (normalized) final answer
      # to the case's expected letter. expected_from is per-case, so adding
      # questions needs no new validators.
      - key: correct_answer
        type: normalized_match
        target: final_output
        expected_from: "case.expectations.answer"
        config:
          pipeline:
            - trim
            - lowercase

    metrics:
      - key: completed
        type: boolean
        collector: run_completed_successfully
      - key: total_tokens
        type: numeric
        collector: run_total_tokens

    runtime_limits:
      max_duration_ms: 60000
      max_total_tokens: 4000

    scorecard:
      strategy: weighted
      pass_threshold: 0.7
      dimensions:
        - key: accuracy
          source: validators
          validators:
            - correct_answer
          weight: 0.8
        - key: reliability
          source: reliability
          weight: 0.1
        - key: cost
          source: cost
          better_direction: lower
          normalization:
            target: 0.002
            max: 0.05
          weight: 0.1

challenges:
  - key: hard-mcq
    title: Answer a hard multiple-choice question
    category: reasoning
    difficulty: hard
    instructions: |
      Answer the multiple-choice question in the input. Think it through, but
      respond with ONLY the single capital letter of the correct option
      (A, B, C, or D) — no other words, no punctuation, no explanation.

      Question: {{question}}

input_sets:
  - key: default
    name: Default Input Set
    cases:
      - challenge_key: hard-mcq
        case_key: transitivity
        payload:
          question: |
            If all Bloops are Razzies and all Razzies are Lazzies, are all
            Bloops necessarily Lazzies?
            A) Yes   B) No   C) Cannot be determined   D) Only some
        expectations:
          - key: answer
            kind: text
            value: "A"
      - challenge_key: hard-mcq
        case_key: bat-and-ball
        payload:
          question: |
            A bat and a ball cost $1.10 together. The bat costs $1.00 more than
            the ball. How much does the ball cost, in cents?
            A) 10   B) 5   C) 1   D) 0.5
        expectations:
          - key: answer
            kind: text
            value: "B"
      - challenge_key: hard-mcq
        case_key: neutral-ph
        payload:
          question: |
            What is the pH of a neutral aqueous solution at 25 degrees Celsius?
            A) 0   B) 7   C) 14   D) 1
        expectations:
          - key: answer
            kind: text
            value: "B"
      - challenge_key: hard-mcq
        case_key: average-speed
        payload:
          question: |
            A train travels 60 miles in 90 minutes. What is its average speed in
            miles per hour?
            A) 90   B) 45   C) 40   D) 60
        expectations:
          - key: answer
            kind: text
            value: "C"
      - challenge_key: hard-mcq
        case_key: hash-lookup
        payload:
          question: |
            Which data structure offers O(1) average-case lookup by key?
            A) Singly linked list   B) Hash table   C) Binary search tree
            D) Unsorted array
        expectations:
          - key: answer
            kind: text
            value: "B"
