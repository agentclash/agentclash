version: 2

project_name: agentclash

builds:
  - id: agentclash
    main: .
    binary: agentclash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: archive
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

release:
  # Tag reruns should replace already-uploaded GitHub release assets instead
  # of failing with "already_exists".
  replace_existing_artifacts: true

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: agentclash
    ids:
      - archive
    binaries:
      - agentclash
    repository:
      owner: agentclash
      name: homebrew-tap
      token: "{{ .Env.HOMEBREW_TAP_TOKEN }}"
    url:
      verified: github.com/agentclash/agentclash
    homepage: "https://github.com/agentclash/agentclash"
    description: "CLI for the AgentClash AI agent evaluation platform"
    license: "FSL-1.1-MIT"
    commit_author:
      name: agentclash-release-bot
      email: releases@agentclash.dev
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}auto{{ else }}true{{ end }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentclash"]
          end
