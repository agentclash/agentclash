version: 2

project_name: agentclash

builds:
  - id: agentclash
    main: .
    binary: agentclash
    env:
      - CGO_ENABLED=0
    goos:
      - linux
      - darwin
      - windows
    goarch:
      - amd64
      - arm64
    ldflags:
      - -s -w
      - -X main.version={{.Version}}
      - -X main.commit={{.ShortCommit}}
      - -X main.date={{.Date}}

archives:
  - id: archive
    formats:
      - tar.gz
    name_template: "{{ .ProjectName }}_{{ .Os }}_{{ .Arch }}"
    format_overrides:
      - goos: windows
        formats:
          - zip

checksum:
  name_template: "checksums.txt"

snapshot:
  version_template: "{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}"

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^test:"
      - "^ci:"
      - "^chore:"

homebrew_casks:
  - name: agentclash
    ids:
      - archive
    binaries:
      - agentclash
    repository:
      owner: agentclash
      name: homebrew-tap
      token: "{{ index .Env \"HOMEBREW_TAP_TOKEN\" }}"
    url:
      verified: github.com/agentclash/agentclash
    homepage: "https://github.com/agentclash/agentclash"
    description: "CLI for the AgentClash AI agent evaluation platform"
    license: "MIT"
    commit_author:
      name: agentclash-release-bot
      email: releases@agentclash.dev
    skip_upload: "{{ if index .Env \"HOMEBREW_TAP_TOKEN\" }}auto{{ else }}true{{ end }}"
    hooks:
      post:
        install: |
          if OS.mac?
            system_command "/usr/bin/xattr", args: ["-dr", "com.apple.quarantine", "#{staged_path}/agentclash"]
          end

winget:
  - name: agentclash
    publisher: AgentClash
    short_description: "CLI for the AgentClash AI agent evaluation platform"
    license: "MIT"
    publisher_url: "https://www.agentclash.dev"
    publisher_support_url: "https://github.com/agentclash/agentclash/issues/new"
    package_identifier: AgentClash.AgentClash
    package_name: AgentClash
    ids:
      - archive
    homepage: "https://github.com/agentclash/agentclash"
    description: "Manage AgentClash workspaces, infrastructure, challenge packs, deployments, runs, and auth from the terminal."
    release_notes: "{{ .Changelog }}"
    release_notes_url: "https://github.com/agentclash/agentclash/releases/tag/{{ .Tag }}"
    installation_notes: "Run `agentclash auth login` to get started."
    tags:
      - ai
      - cli
      - evaluation
    skip_upload: "{{ if index .Env \"WINGET_TOKEN\" }}auto{{ else }}true{{ end }}"
    repository:
      owner: agentclash
      name: winget-pkgs
      branch: agentclash-{{ .Version }}
      token: "{{ index .Env \"WINGET_TOKEN\" }}"
      pull_request:
        enabled: true
        draft: false
        base:
          owner: microsoft
          name: winget-pkgs
          branch: master
    commit_author:
      name: agentclash-release-bot
      email: releases@agentclash.dev
